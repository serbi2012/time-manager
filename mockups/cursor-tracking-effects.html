            // ============================================
            // SHARED: useMousePosition hook
            // ============================================
            function useMousePosition(ref) {
                const [pos, setPos] = React.useState({
                    x: 0,
                    y: 0,
                    inside: false,
                });

                React.useEffect(() => {
                    const el = ref.current;
                    if (!el) return;

                    const handleMove = (e) => {
                        const rect = el.getBoundingClientRect();
                        setPos({
                            x: e.clientX - rect.left,
                            y: e.clientY - rect.top,
                            inside: true,
                        });
                    };
                    const handleLeave = () =>
                        setPos((p) => ({ ...p, inside: false }));

                    el.addEventListener("mousemove", handleMove);
                    el.addEventListener("mouseleave", handleLeave);
                    return () => {
                        el.removeEventListener("mousemove", handleMove);
                        el.removeEventListener("mouseleave", handleLeave);
                    };
                }, [ref]);

                return pos;
            }

            // ============================================
            // EFFECT 3: 3D Tilt Card
            // ============================================
            function TiltCard({ children, className = "", maxTilt = 6 }) {
                const ref = React.useRef(null);
                const [transform, setTransform] = React.useState("");

                const handleMove = (e) => {
                    const rect = ref.current.getBoundingClientRect();
                    const x = (e.clientX - rect.left) / rect.width;
                    const y = (e.clientY - rect.top) / rect.height;
                    const tiltX = (0.5 - y) * maxTilt;
                    const tiltY = (x - 0.5) * maxTilt;
                    setTransform(
                        `perspective(600px) rotateX(${tiltX}deg) rotateY(${tiltY}deg) scale3d(1.01, 1.01, 1.01)`
                    );
                };

                const handleLeave = () => {
                    setTransform(
                        "perspective(600px) rotateX(0deg) rotateY(0deg) scale3d(1, 1, 1)"
                    );
                };

                return (
                    <div
                        ref={ref}
                        className={`bg-white rounded-lg border border-border-default ${className}`}
                        style={{
                            transform:
                                transform ||
                                "perspective(600px) rotateX(0deg) rotateY(0deg)",
                            transition:
                                "transform 0.15s ease-out, box-shadow 0.15s ease-out",
                            boxShadow: transform.includes("scale3d(1.01")
                                ? "0 8px 24px rgba(0,0,0,0.08)"
                                : "0 1px 2px rgba(0,0,0,0.04)",
                            willChange: "transform",
                        }}
                        onMouseMove={handleMove}
                        onMouseLeave={handleLeave}
                    >
                        {children}
                    </div>
                );
            }

            // ============================================
            // EFFECT 4: Magnetic Button
            // ============================================
            function MagneticButton({
                children,
                className = "",
                strength = 0.3,
                ...props
            }) {
                const ref = React.useRef(null);
                const [offset, setOffset] = React.useState({ x: 0, y: 0 });

                const handleMove = (e) => {
                    const rect = ref.current.getBoundingClientRect();
                    const cx = rect.left + rect.width / 2;
                    const cy = rect.top + rect.height / 2;
                    const dx = (e.clientX - cx) * strength;
                    const dy = (e.clientY - cy) * strength;
                    setOffset({ x: dx, y: dy });
                };

                const handleLeave = () => setOffset({ x: 0, y: 0 });

                return (
                    <div
                        ref={ref}
                        className={`inline-block ${className}`}
                        onMouseMove={handleMove}
                        onMouseLeave={handleLeave}
                        style={{
                            transform: `translate(${offset.x}px, ${offset.y}px)`,
                            transition:
                                offset.x === 0 && offset.y === 0
                                    ? "transform 0.4s cubic-bezier(0.23, 1, 0.32, 1)"
                                    : "transform 0.1s ease-out",
                        }}
                    >
                        {children}
                    </div>
                );
            }

            // ============================================
            // EFFECT 7: Border Beam Card
            // ============================================
            function BorderBeamCard({
                children,
                className = "",
                duration = 4,
            }) {
                const [hovered, setHovered] = React.useState(false);
                const [angle, setAngle] = React.useState(0);
                const frameRef = React.useRef(null);

                React.useEffect(() => {
                    if (!hovered) return;
                    let start = null;
                    const animate = (ts) => {
                        if (!start) start = ts;
                        const elapsed = ts - start;
                        setAngle(((elapsed / (duration * 1000)) * 360) % 360);
                        frameRef.current = requestAnimationFrame(animate);
                    };
                    frameRef.current = requestAnimationFrame(animate);
                    return () => cancelAnimationFrame(frameRef.current);
                }, [hovered, duration]);

                return (
                    <div
                        className={`relative rounded-xl p-[1.5px] ${className}`}
                        style={{
                            background: hovered
                                ? `conic-gradient(from ${angle}deg at 50% 50%, transparent 0%, transparent 70%, #3182F6 80%, rgba(49,130,246,0.4) 90%, transparent 100%)`
                                : "#E5E8EB",

            // ============================================
            // EFFECT 8: Spotlight + Tilt Combined Card
            // ============================================
            function SpotlightTiltCard({
                children,
                className = "",
                maxTilt = 4,
            }) {
                const ref = React.useRef(null);
                const mouse = useMousePosition(ref);
                const [transform, setTransform] = React.useState("");

                React.useEffect(() => {
                    if (!ref.current || !mouse.inside) {
                        setTransform(
                            "perspective(600px) rotateX(0deg) rotateY(0deg) scale3d(1, 1, 1)"
                        );
                        return;
                    }
                    const rect = ref.current.getBoundingClientRect();
                    const x = mouse.x / rect.width;
                    const y = mouse.y / rect.height;
                    const tiltX = (0.5 - y) * maxTilt;
                    const tiltY = (x - 0.5) * maxTilt;
                    setTransform(
                        `perspective(600px) rotateX(${tiltX}deg) rotateY(${tiltY}deg) scale3d(1.01, 1.01, 1.01)`
                    );
                }, [mouse, maxTilt]);

                return (
                    <div
                        ref={ref}
                        className={`relative rounded-xl p-[1px] ${className}`}
                        style={{
                            transform,
                            transition: mouse.inside
                                ? "transform 0.1s ease-out"
                                : "transform 0.4s cubic-bezier(0.23, 1, 0.32, 1)",
                            background: mouse.inside
                                ? `radial-gradient(400px circle at ${mouse.x}px ${mouse.y}px, rgba(49, 130, 246, 0.25), #E5E8EB 60%)`
                                : "#E5E8EB",
                            willChange: "transform",
                        }}
                    >
                        <div
                            className="relative bg-white rounded-[11px] overflow-hidden"
                            style={{
                                boxShadow: mouse.inside
                                    ? "0 8px 30px rgba(0,0,0,0.08)"
                                    : "0 1px 2px rgba(0,0,0,0.04)",
                                transition: "box-shadow 0.2s ease",
                            }}
                        >
                            {mouse.inside && (
                                <div
                                    className="pointer-events-none absolute inset-0"
                                    style={{
                                        background: `radial-gradient(300px circle at ${mouse.x}px ${mouse.y}px, rgba(49, 130, 246, 0.05), transparent 60%)`,
                                    }}
                                />
                            )}
                            <div className="relative z-10">{children}</div>
                        </div>
                    </div>
                );
            }
