    <body>
        <div id="root"></div>

        <script type="text/babel">
            const { Avatar, Dropdown, Badge, Tooltip, Tag } = antd;
            const { Text } = antd.Typography;
            const {

                HomeOutlined,
                CalendarOutlined,
                MessageOutlined,
                BookOutlined,
                SettingOutlined,
                BellOutlined,
                UserOutlined,
                CloudSyncOutlined,

                RightOutlined,
            } = icons;

            // ============================================
            //  공통 컴포넌트
            // ============================================

            function SectionDivider({ label, description }) {
                return (
                    <div className="bg-white border-b border-border-default px-xl py-lg mb-0">

            function FakeContent({ label }) {
                return (
                    <div className="flex-1 bg-bg-app min-h-[280px] flex items-center justify-center">

            }

            function FakeSidebar() {
                return (
                    <div className="w-[300px] bg-bg-app border-r border-border-default flex flex-col items-center justify-center min-h-[280px]">

                        <div className="text-xs text-text-disabled">
                            사이드바
                        </div>
                    </div>

            }

            // ============================================
            //  안 A: 화이트 클린 헤더
            //  — 화이트 배경, 섬세한 보더, 필(pill) 네비게이션
            // ============================================

            function DesignA() {
                const [active, setActive] = React.useState("daily");

                const nav_items = [
                    {
                        key: "daily",
                        label: "일간 기록",
                        icon: <HomeOutlined />,
                    },
                    {
                        key: "weekly",
                        label: "주간 일정",
                        icon: <CalendarOutlined />,
                    },
                    {
                        key: "guide",
                        label: "사용 설명서",
                        icon: <BookOutlined />,
                    },
                ];

                return (
                    <div className="bg-bg-app min-h-[400px] rounded-xl overflow-hidden border border-border-default shadow-sm">
                        {/* Header */}

                            <div className="h-[56px] px-xl flex items-center justify-between max-w-[1400px] mx-auto">

                                                flex items-center gap-xs px-lg py-[6px] rounded-md text-sm font-medium
                                                transition-all duration-200 border-0 cursor-pointer

                                                    active === item.key
                                                        ? "bg-white text-text-primary shadow-sm"
                                                        : "bg-transparent text-text-secondary hover:text-text-primary"

                                            <span className="text-[14px]">
