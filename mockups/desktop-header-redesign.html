<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>B안 — 메뉴 전환 애니메이션 후보</title>

        <script src="https://cdn.tailwindcss.com"></script>
        <script>
            tailwind.config = {
                theme: {
                    extend: {
                        spacing: {
                            xs: "4px",
                            sm: "8px",
                            md: "12px",
                            lg: "16px",
                            xl: "24px",
                            "2xl": "32px",
                        },
                        colors: {
                            primary: "#3182F6",
                            "primary-dark": "#1B64DA",
                            "text-primary": "#191F28",
                            "text-secondary": "#6B7684",
                            "text-disabled": "#B0B8C1",
                            "text-hint": "#D1D6DB",
                            "bg-app": "#F9FAFB",
                            "bg-grey": "#F2F4F6",
                            "border-default": "#E5E8EB",
                            "border-light": "#F2F4F6",
                            success: "#34C759",
                        },
                        borderRadius: {
                            xs: "4px",
                            sm: "6px",
                            md: "8px",
                            lg: "12px",
                            xl: "16px",
                        },
                        fontSize: {
                            xs: "11px",
                            sm: "13px",
                            md: "15px",
                            lg: "17px",
                        },
                    },
                },
            };
        </script>

        <script
            crossorigin
            src="https://unpkg.com/react@18/umd/react.development.js"
        ></script>
        <script
            crossorigin
            src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"
        ></script>
        <script src="https://unpkg.com/dayjs@1/dayjs.min.js"></script>
        <script src="https://unpkg.com/antd@5/dist/antd.min.js"></script>
        <script src="https://unpkg.com/@ant-design/icons@5/dist/index.umd.min.js"></script>
        <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

        <link
            rel="stylesheet"
            as="style"
            crossorigin
            href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css"
        />

        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            body {
                font-family: "Pretendard Variable", Pretendard, -apple-system,
                    BlinkMacSystemFont, system-ui, sans-serif;
                background: #f2f4f6;
                -webkit-font-smoothing: antialiased;
            }
            #root {
                max-width: 1400px;
                margin: 0 auto;
                padding: 32px 24px;
            }
            .mockup-header {
                text-align: center;
                margin-bottom: 48px;
                padding-bottom: 20px;
                border-bottom: 1px solid #e5e8eb;
            }
            .mockup-header h1 {
                font-size: 22px;
                font-weight: 600;
                color: #191f28;
                margin: 0 0 6px;
            }
            .mockup-header p {
                font-size: 13px;
                color: #6b7684;
                margin: 0;
                line-height: 1.6;
            }
            .mockup-section {
                margin-bottom: 64px;
            }
            .mockup-section-label {
                font-size: 11px;
                font-weight: 700;
                text-transform: uppercase;
                letter-spacing: 1px;
                color: #3182f6;
                margin-bottom: 6px;
            }
            .mockup-section-desc {
                font-size: 13px;
                color: #6b7684;
                margin-bottom: 16px;
                line-height: 1.6;
            }
            .mockup-frame {
                border-radius: 16px;
                box-shadow: 0 4px 24px rgba(0, 0, 0, 0.07);
                overflow: hidden;
                border: 1px solid #e5e8eb;
            }
            .tag-rec {
                display: inline-block;
                font-size: 11px;
                font-weight: 600;
                color: #3182f6;
                background: #ecf2fe;
                padding: 2px 8px;
                border-radius: 4px;
                margin-right: 6px;
            }
            .hint-box {
                margin-top: 12px;
                padding: 12px 16px;
                background: #ecf2fe;
                border-radius: 8px;
                font-size: 13px;
                color: #1b64da;
                line-height: 1.6;
            }

            .fake-sidebar-item {
                display: flex;
                align-items: center;
                gap: 8px;
                padding: 8px 12px;
                border-radius: 8px;
            }
            .fake-sidebar-item .dot {
                width: 8px;
                height: 8px;
                border-radius: 4px;
                flex-shrink: 0;
            }
            .fake-sidebar-item .label {
                font-size: 13px;
                color: #4e5968;
            }
            .fake-sidebar-item .sub {
                font-size: 11px;
                color: #b0b8c1;
            }
            .fake-gantt {
                height: 60px;
                background: #f9fafb;
                border-radius: 8px;
                display: flex;
                align-items: center;
                padding: 0 16px;
            }
            .fake-gantt-bar {
                height: 28px;
                border-radius: 6px;
                opacity: 0.8;
            }
            .fake-table-row {
                display: flex;
                align-items: center;
                height: 44px;
                padding: 0 16px;
                border-bottom: 1px solid #f2f4f6;
                font-size: 13px;
                color: #6b7684;
            }
            .fake-table-header {
                background: #f9fafb;
                font-weight: 600;
                color: #6b7684;
                font-size: 12px;
            }
        </style>
    </head>
    <body>
        <div id="root"></div>

        <script type="text/babel">
            const { Avatar } = antd;
            const {
                ClockCircleOutlined,
                HomeOutlined,
                CalendarOutlined,
                BookOutlined,
                SettingOutlined,
            } = icons;

            const NAV_ITEMS = [
                {
                    key: "daily",
                    label: "일간 기록",
                    icon: <HomeOutlined style={{ fontSize: 13 }} />,
                },
                {
                    key: "weekly",
                    label: "주간 일정",
                    icon: <CalendarOutlined style={{ fontSize: 13 }} />,
                },
                {
                    key: "guide",
                    label: "사용 설명서",
                    icon: <BookOutlined style={{ fontSize: 13 }} />,
                },
            ];

            function FakePageBody({ activeKey }) {
                const titles = {
                    daily: "일간 타임라인",
                    weekly: "주간 일정",
                    guide: "사용 설명서",
                };
                return (
                    <div className="flex" style={{ height: 280 }}>
                        <div className="w-[240px] flex-shrink-0 p-lg bg-white border-r border-border-light">
                            <div className="text-xs font-semibold text-text-secondary mb-md px-xs">
                                작업 프리셋
                            </div>
                            <div className="flex flex-col gap-xs">
                                {[
                                    {
                                        color: "#3182F6",
                                        name: "문서작업",
                                        sub: "개발팀 · 프론트",
                                    },
                                    {
                                        color: "#34C759",
                                        name: "환경설정",
                                        sub: "시스템 · 환경세팅",
                                    },
                                    {
                                        color: "#F04452",
                                        name: "회의",
                                        sub: "정기 · 회의",
                                    },
                                    {
                                        color: "#FF9500",
                                        name: "정의융합",
                                        sub: "리서치 · 문서정리",
                                    },
                                ].map((item, i) => (
                                    <div
                                        key={i}
                                        className="fake-sidebar-item"
                                        style={{
                                            background:
                                                i === 0
                                                    ? "#F2F4F6"
                                                    : "transparent",
                                        }}
                                    >
                                        <div
                                            className="dot"
                                            style={{ background: item.color }}
                                        />
                                        <div>
                                            <div className="label">
                                                {item.name}
                                            </div>
                                            <div className="sub">
                                                {item.sub}
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                        <div className="flex-1 p-xl overflow-hidden bg-bg-app">
                            <div className="text-sm font-semibold text-text-primary mb-md">
                                {titles[activeKey]}
                            </div>
                            <div className="fake-gantt mb-lg">
                                <div className="flex items-center gap-sm w-full">
                                    <div
                                        className="fake-gantt-bar w-[15%] ml-[20%]"
                                        style={{ background: "#3182F6" }}
                                    />
                                    <div
                                        className="fake-gantt-bar w-[8%]"
                                        style={{ background: "#34C759" }}
                                    />
                                    <div
                                        className="fake-gantt-bar w-[12%] ml-[5%]"
                                        style={{ background: "#F04452" }}
                                    />
                                </div>
                            </div>
                            <div className="bg-white rounded-lg border border-border-light overflow-hidden">
                                <div className="fake-table-row fake-table-header">
                                    <span className="w-[30%]">작업명</span>
                                    <span className="w-[20%]">카테고리</span>
                                    <span className="w-[15%]">시간</span>
                                    <span className="w-[20%]">시작·종료</span>
                                    <span className="w-[15%]">날짜</span>
                                </div>
                                <div className="fake-table-row">
                                    <span className="w-[30%] text-text-primary">
                                        세트메뉴설정 · 검색조건
                                    </span>
                                    <span className="w-[20%]">개발</span>
                                    <span className="w-[15%]">0분</span>
                                    <span className="w-[20%]">22:06</span>
                                    <span className="w-[15%]">02-24</span>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            }

            function RightActions() {
                return (
                    <div className="flex items-center gap-md">
                        <div
                            className="flex items-center gap-[5px] px-sm py-[3px] rounded-full"
                            style={{ background: "rgba(255,255,255,0.12)" }}
                        >
                            <div
                                className="w-[5px] h-[5px] rounded-full"
                                style={{ background: "#7DEFA0" }}
                            />
                            <span
                                className="text-xs"
                                style={{ color: "rgba(255,255,255,0.7)" }}
                            >
                                동기화됨
                            </span>
                        </div>
                        <div
                            className="w-[1px] h-[14px]"
                            style={{ background: "rgba(255,255,255,0.15)" }}
                        />
                        <button
                            className="w-[28px] h-[28px] rounded-md flex items-center justify-center bg-transparent border-none cursor-pointer hover:bg-white/10 transition-all"
                            style={{ color: "rgba(255,255,255,0.7)" }}
                        >
                            <SettingOutlined style={{ fontSize: 14 }} />
                        </button>
                        <Avatar
                            size={26}
                            style={{
                                backgroundColor: "rgba(255,255,255,0.2)",
                                fontSize: 11,
                                color: "white",
                            }}
                        >
                            김
                        </Avatar>
                    </div>
                );
            }

            // ============================================
            // 1: Slide Pill (슬라이딩 배경)
            // ============================================
            function Anim1() {
                const [active, setActive] = React.useState("daily");
                const nav_ref = React.useRef(null);
                const [pill_style, setPillStyle] = React.useState({});

                React.useEffect(() => {
                    if (!nav_ref.current) return;
                    const active_btn = nav_ref.current.querySelector(
                        `[data-key="${active}"]`
                    );
                    if (active_btn) {
                        const nav_rect =
                            nav_ref.current.getBoundingClientRect();
                        const btn_rect = active_btn.getBoundingClientRect();
                        setPillStyle({
                            left: btn_rect.left - nav_rect.left,
                            width: btn_rect.width,
                            height: btn_rect.height,
                            top: btn_rect.top - nav_rect.top,
                        });
                    }
                }, [active]);

                return (
                    <div>
                        <div
                            className="h-[52px] flex items-center justify-between px-xl"
                            style={{
                                background:
                                    "linear-gradient(135deg, #3182F6 0%, #1B64DA 100%)",
                            }}
                        >
                            <div className="flex items-center gap-2xl">
                                <div className="flex items-center gap-[10px] cursor-pointer">
                                    <ClockCircleOutlined
                                        style={{ color: "white", fontSize: 18 }}
                                    />
                                    <span className="text-md font-semibold text-white">
                                        업무 시간
                                    </span>
                                </div>

                                <nav
                                    ref={nav_ref}
                                    className="relative flex items-center gap-[4px]"
                                >
                                    {/* Sliding pill */}
                                    <div
                                        className="absolute rounded-full"
                                        style={{
                                            background: "white",
                                            left: pill_style.left || 0,
                                            top: pill_style.top || 0,
                                            width: pill_style.width || 0,
                                            height: pill_style.height || 0,
                                            transition:
                                                "all 300ms cubic-bezier(0.4, 0, 0.2, 1)",
                                            boxShadow:
                                                "0 2px 8px rgba(0,0,0,0.1)",
                                        }}
                                    />
                                    {NAV_ITEMS.map((item) => (
                                        <button
                                            key={item.key}
                                            data-key={item.key}
                                            onClick={() => setActive(item.key)}
                                            className="relative z-10 flex items-center gap-[6px] px-lg py-[5px] rounded-full text-sm border-none cursor-pointer transition-colors duration-200"
                                            style={{
                                                background: "transparent",
                                                color:
                                                    active === item.key
                                                        ? "#1B64DA"
                                                        : "rgba(255,255,255,0.65)",
                                                fontWeight:
                                                    active === item.key
                                                        ? 600
                                                        : 500,
                                            }}
                                        >
                                            {item.icon}
                                            {item.label}
                                        </button>
                                    ))}
                                </nav>
                            </div>
                            <RightActions />
                        </div>
                        <FakePageBody activeKey={active} />
                    </div>
                );
            }

            // ============================================
            // 2: Scale Pop (선택 시 살짝 커졌다 돌아옴)
            // ============================================
            function Anim2() {
                const [active, setActive] = React.useState("daily");
                const [popping, setPopping] = React.useState(null);

                const handleClick = (key) => {
                    if (key === active) return;
                    setPopping(key);
                    setActive(key);
                    setTimeout(() => setPopping(null), 300);
                };

                return (
                    <div>
                        <div
                            className="h-[52px] flex items-center justify-between px-xl"
                            style={{
                                background:
                                    "linear-gradient(135deg, #3182F6 0%, #1B64DA 100%)",
                            }}
                        >
                            <div className="flex items-center gap-2xl">
                                <div className="flex items-center gap-[10px] cursor-pointer">
                                    <ClockCircleOutlined
                                        style={{ color: "white", fontSize: 18 }}
                                    />
                                    <span className="text-md font-semibold text-white">
                                        업무 시간
                                    </span>
                                </div>

                                <nav className="flex items-center gap-[4px]">
                                    {NAV_ITEMS.map((item) => (
                                        <button
                                            key={item.key}
                                            onClick={() =>
                                                handleClick(item.key)
                                            }
                                            className="flex items-center gap-[6px] px-lg py-[5px] rounded-full text-sm border-none cursor-pointer"
                                            style={{
                                                background:
                                                    active === item.key
                                                        ? "white"
                                                        : "transparent",
                                                color:
                                                    active === item.key
                                                        ? "#1B64DA"
                                                        : "rgba(255,255,255,0.65)",
                                                fontWeight:
                                                    active === item.key
                                                        ? 600
                                                        : 500,
                                                boxShadow:
                                                    active === item.key
                                                        ? "0 2px 8px rgba(0,0,0,0.1)"
                                                        : "none",
                                                transform:
                                                    popping === item.key
                                                        ? "scale(1.06)"
                                                        : "scale(1)",
                                                transition:
                                                    "transform 300ms cubic-bezier(0.34, 1.56, 0.64, 1), background 200ms ease, color 200ms ease, box-shadow 200ms ease",
                                            }}
                                        >
                                            {item.icon}
                                            {item.label}
                                        </button>
                                    ))}
                                </nav>
                            </div>
                            <RightActions />
                        </div>
                        <FakePageBody activeKey={active} />
                    </div>
                );
            }

            // ============================================
            // 3: Fade Crossover (페이드 전환)
            // ============================================
            function Anim3() {
                const [active, setActive] = React.useState("daily");
                const [transitioning, setTransitioning] = React.useState(false);

                const handleClick = (key) => {
                    if (key === active) return;
                    setTransitioning(true);
                    setTimeout(() => {
                        setActive(key);
                        setTimeout(() => setTransitioning(false), 150);
                    }, 150);
                };

                return (
                    <div>
                        <div
                            className="h-[52px] flex items-center justify-between px-xl"
                            style={{
                                background:
                                    "linear-gradient(135deg, #3182F6 0%, #1B64DA 100%)",
                            }}
                        >
                            <div className="flex items-center gap-2xl">
                                <div className="flex items-center gap-[10px] cursor-pointer">
                                    <ClockCircleOutlined
                                        style={{ color: "white", fontSize: 18 }}
                                    />
                                    <span className="text-md font-semibold text-white">
                                        업무 시간
                                    </span>
                                </div>

                                <nav className="flex items-center gap-[4px]">
                                    {NAV_ITEMS.map((item) => (
                                        <button
                                            key={item.key}
                                            onClick={() =>
                                                handleClick(item.key)
                                            }
                                            className="flex items-center gap-[6px] px-lg py-[5px] rounded-full text-sm border-none cursor-pointer"
                                            style={{
                                                background:
                                                    active === item.key
                                                        ? "white"
                                                        : "transparent",
                                                color:
                                                    active === item.key
                                                        ? "#1B64DA"
                                                        : "rgba(255,255,255,0.65)",
                                                fontWeight:
                                                    active === item.key
                                                        ? 600
                                                        : 500,
                                                boxShadow:
                                                    active === item.key
                                                        ? "0 2px 8px rgba(0,0,0,0.1)"
                                                        : "none",
                                                opacity:
                                                    transitioning &&
                                                    active === item.key
                                                        ? 0
                                                        : 1,
                                                transition: "all 200ms ease",
                                            }}
                                        >
                                            {item.icon}
                                            {item.label}
                                        </button>
                                    ))}
                                </nav>
                            </div>
                            <RightActions />
                        </div>
                        <FakePageBody activeKey={active} />
                    </div>
                );
            }

            // ============================================
            // 4: Spring Bounce (스프링 바운스)
            // ============================================
            function Anim4() {
                const [active, setActive] = React.useState("daily");
                const nav_ref = React.useRef(null);
                const [pill_style, setPillStyle] = React.useState({});

                React.useEffect(() => {
                    if (!nav_ref.current) return;
                    const active_btn = nav_ref.current.querySelector(
                        `[data-key="${active}"]`
                    );
                    if (active_btn) {
                        const nav_rect =
                            nav_ref.current.getBoundingClientRect();
                        const btn_rect = active_btn.getBoundingClientRect();
                        setPillStyle({
                            left: btn_rect.left - nav_rect.left,
                            width: btn_rect.width,
                            height: btn_rect.height,
                            top: btn_rect.top - nav_rect.top,
                        });
                    }
                }, [active]);

                return (
                    <div>
                        <div
                            className="h-[52px] flex items-center justify-between px-xl"
                            style={{
                                background:
                                    "linear-gradient(135deg, #3182F6 0%, #1B64DA 100%)",
                            }}
                        >
                            <div className="flex items-center gap-2xl">
                                <div className="flex items-center gap-[10px] cursor-pointer">
                                    <ClockCircleOutlined
                                        style={{ color: "white", fontSize: 18 }}
                                    />
                                    <span className="text-md font-semibold text-white">
                                        업무 시간
                                    </span>
                                </div>

                                <nav
                                    ref={nav_ref}
                                    className="relative flex items-center gap-[4px]"
                                >
                                    <div
                                        className="absolute rounded-full"
                                        style={{
                                            background: "white",
                                            left: pill_style.left || 0,
                                            top: pill_style.top || 0,
                                            width: pill_style.width || 0,
                                            height: pill_style.height || 0,
                                            transition:
                                                "all 500ms cubic-bezier(0.34, 1.56, 0.64, 1)",
                                            boxShadow:
                                                "0 2px 8px rgba(0,0,0,0.1)",
                                        }}
                                    />
                                    {NAV_ITEMS.map((item) => (
                                        <button
                                            key={item.key}
                                            data-key={item.key}
                                            onClick={() => setActive(item.key)}
                                            className="relative z-10 flex items-center gap-[6px] px-lg py-[5px] rounded-full text-sm border-none cursor-pointer"
                                            style={{
                                                background: "transparent",
                                                color:
                                                    active === item.key
                                                        ? "#1B64DA"
                                                        : "rgba(255,255,255,0.65)",
                                                fontWeight:
                                                    active === item.key
                                                        ? 600
                                                        : 500,
                                                transition: "color 250ms ease",
                                            }}
                                        >
                                            {item.icon}
                                            {item.label}
                                        </button>
                                    ))}
                                </nav>
                            </div>
                            <RightActions />
                        </div>
                        <FakePageBody activeKey={active} />
                    </div>
                );
            }

            // ============================================
            // 5: Slide + Morph (너비 변화 포함)
            // ============================================
            function Anim5() {
                const [active, setActive] = React.useState("daily");
                const nav_ref = React.useRef(null);
                const [pill_style, setPillStyle] = React.useState({});
                const [morphing, setMorphing] = React.useState(false);

                React.useEffect(() => {
                    if (!nav_ref.current) return;
                    const active_btn = nav_ref.current.querySelector(
                        `[data-key="${active}"]`
                    );
                    if (active_btn) {
                        const nav_rect =
                            nav_ref.current.getBoundingClientRect();
                        const btn_rect = active_btn.getBoundingClientRect();

                        setMorphing(true);
                        setTimeout(() => setMorphing(false), 200);

                        setPillStyle({
                            left: btn_rect.left - nav_rect.left,
                            width: btn_rect.width,
                            height: btn_rect.height,
                            top: btn_rect.top - nav_rect.top,
                        });
                    }
                }, [active]);

                return (
                    <div>
                        <div
                            className="h-[52px] flex items-center justify-between px-xl"
                            style={{
                                background:
                                    "linear-gradient(135deg, #3182F6 0%, #1B64DA 100%)",
                            }}
                        >
                            <div className="flex items-center gap-2xl">
                                <div className="flex items-center gap-[10px] cursor-pointer">
                                    <ClockCircleOutlined
                                        style={{ color: "white", fontSize: 18 }}
                                    />
                                    <span className="text-md font-semibold text-white">
                                        업무 시간
                                    </span>
                                </div>

                                <nav
                                    ref={nav_ref}
